<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bashonacci.sh — CachyOS service installer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0C0C0E;--surface:#131318;--surface2:#18181F;
  --border:#1E1E28;--border2:#2A2A38;
  --green:#3DD68C;--green-d:#27A86B;
  --amber:#E8A838;--blue:#5B9CF6;--red:#F06B6B;
  --text:#F0F0F4;--muted:#8A8A9A;--dim:#4A4A5A;
  --ui:Inter,system-ui,sans-serif;
  --code:'JetBrains Mono',Consolas,monospace;
  --r:5px;--nav-h:56px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--ui);font-size:15px;font-weight:400;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:rgba(12,12,14,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 40px;z-index:100}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;margin-right:auto}
.logo-mark{width:28px;height:28px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--code);font-size:12px;font-weight:500;color:#0C0C0E;flex-shrink:0}
.logo-name{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-0.02em}
.logo-name span{color:var(--muted);font-weight:400}
.nav-links{display:flex;align-items:center;gap:4px;list-style:none}
.nav-links a{padding:6px 12px;border-radius:var(--r);color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;display:flex;align-items:center;gap:7px;transition:color .15s,background .15s}
.nav-links a:hover{color:var(--text);background:rgba(255,255,255,0.05)}
.nav-links a.active{color:var(--text)}
.kbd{font-size:10px;font-weight:400;padding:1px 5px;background:var(--surface);border:1px solid var(--border2);border-radius:3px;color:var(--dim);font-family:var(--ui)}
.nav-gh{margin-left:12px;display:flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid var(--border2);border-radius:var(--r);color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;transition:all .15s}
.nav-gh:hover{border-color:var(--green);color:var(--green)}
.page{padding-top:var(--nav-h);min-height:100vh}
.wrap{max-width:1040px;margin:0 auto;padding:0 40px}
h1{font-size:clamp(30px,4vw,50px);font-weight:700;letter-spacing:-0.03em;line-height:1.1;color:var(--text)}
h2{font-size:clamp(20px,2.5vw,30px);font-weight:600;letter-spacing:-0.025em;line-height:1.2;color:var(--text)}
h3{font-size:17px;font-weight:600;letter-spacing:-0.015em;line-height:1.3;color:var(--text)}
p{color:var(--muted);font-weight:400;line-height:1.7}
.eyebrow{font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--green);display:flex;align-items:center;gap:8px;margin-bottom:14px}
.eyebrow::before{content:'//';color:var(--dim);font-weight:300;letter-spacing:0}
.term{background:#08080F;border:1px solid var(--border);border-radius:8px;overflow:hidden;font-family:var(--code)}
.term-bar{display:flex;align-items:center;gap:6px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border)}
.dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.dr{background:#FF5F57}.dy{background:#FEBC2E}.dg{background:#28C840}
.term-title{margin-left:8px;font-size:11px;font-weight:400;color:var(--dim);font-family:var(--ui);flex:1;text-align:center}
.term-body{padding:20px 22px;font-size:13px}
.ps1{color:var(--green);user-select:none;margin-right:8px;font-weight:400}
.tc{color:var(--text);font-weight:500}
.to{color:var(--muted);font-weight:400}
.tok{color:var(--green);font-weight:400}
.tw{color:var(--amber);font-weight:400}
.tb{color:var(--blue);font-weight:400}
.td{color:var(--dim);font-weight:300}
.kw{color:var(--amber);font-weight:500}
.kwb{color:var(--blue);font-weight:400}
.copy-btn{background:none;border:1px solid var(--border2);color:var(--muted);font-family:var(--ui);font-size:12px;font-weight:500;letter-spacing:0.04em;padding:5px 12px;border-radius:var(--r);cursor:pointer;transition:all .15s}
.copy-btn:hover{border-color:var(--green);color:var(--green)}
.copy-btn.ok{border-color:var(--green);color:var(--green);background:rgba(61,214,140,0.07)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--r);font-family:var(--ui);font-size:14px;font-weight:500;cursor:pointer;text-decoration:none;transition:all .15s;border:none}
.btn-primary{background:var(--green);color:#0C0C0E}
.btn-primary:hover{background:var(--green-d)}
.btn-ghost{background:none;border:1px solid var(--border2);color:var(--muted)}
.btn-ghost:hover{border-color:var(--text);color:var(--text)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;transition:border-color .2s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--green);opacity:0;transition:opacity .2s}
.card:hover{border-color:var(--border2)}.card:hover::before{opacity:1}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border:1px solid var(--border2);border-radius:20px;font-size:12px;font-weight:400;color:var(--muted);background:var(--surface)}
.bdot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.chip{display:inline-block;font-size:11px;font-weight:500;letter-spacing:0.04em;padding:2px 7px;border-radius:3px}
.chip-ok{background:rgba(61,214,140,.1);color:var(--green);border:1px solid rgba(61,214,140,.2)}
.chip-w{background:rgba(232,168,56,.1);color:var(--amber);border:1px solid rgba(232,168,56,.2)}
.chip-bad{background:rgba(240,107,107,.1);color:var(--red);border:1px solid rgba(240,107,107,.2)}
.chip-b{background:rgba(91,156,246,.1);color:var(--blue);border:1px solid rgba(91,156,246,.2)}
hr{border:none;border-top:1px solid var(--border);margin:64px 0}
footer{border-top:1px solid var(--border);padding:28px 40px;display:flex;justify-content:space-between;align-items:center;max-width:1040px;margin:0 auto}
footer p{font-size:13px;font-weight:400;color:var(--dim);margin:0}
footer a{color:var(--dim);text-decoration:none;font-weight:500;transition:color .15s}
footer a:hover{color:var(--green)}
#toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--green-d);color:var(--green);padding:10px 18px;font-size:13px;font-weight:500;border-radius:var(--r);opacity:0;transform:translateY(4px);transition:all .18s;pointer-events:none;z-index:9999;font-family:var(--ui)}
#toast.show{opacity:1;transform:translateY(0)}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.u{animation:up .4s ease both}
.u1{animation-delay:.07s}.u2{animation-delay:.14s}.u3{animation-delay:.21s}
@media(max-width:700px){nav{padding:0 20px}.wrap{padding:0 20px}.hide-m{display:none}footer{flex-direction:column;gap:8px;text-align:center;padding:24px 20px}}
